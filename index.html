<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartelera de Películas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="%23e8c47a"><polygon points="30,20 80,50 30,80"/></svg>'>

  <style>
    :root {
      --bg:        #0b0b0f;
      --surface:   #111118;
      --card:      #17171f;
      --card-hover:#1e1e28;
      --border:    #2c2c3a;
      --gold:      #e2b96a;
      --gold-dim:  #9a7a3a;
      --green:     #4caf7d;
      --green-dim: #2a5c42;
      --red:       #e84040;
      --text:      #e8e4dc;
      --muted:     #777080;
      --font-head: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --radius:    10px;
      --tr:        0.22s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 24px rgba(0,0,0,0.5);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .header-brand .logo-icon {
      width: 26px;
      height: 26px;
      background: var(--gold);
      clip-path: polygon(20% 10%, 90% 50%, 20% 90%);
      flex-shrink: 0;
    }

    .header-brand h1 {
      font-family: var(--font-head);
      font-size: 1.7rem;
      letter-spacing: 3px;
      color: var(--gold);
      line-height: 1;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* Botón ¿Qué miro hoy? en header */
    .btn-random-header {
      padding: 0.42rem 1rem;
      background: var(--gold);
      color: #0b0b0f;
      border: none;
      border-radius: 8px;
      font-family: var(--font-head);
      font-size: 0.95rem;
      letter-spacing: 1px;
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--tr), box-shadow var(--tr);
    }
    .btn-random-header:hover {
      background: #f0d08a;
      box-shadow: 0 0 14px rgba(226,185,106,0.3);
    }

    .header-search {
      position: relative;
      width: 240px;
    }

    .header-search input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.88rem;
      padding: 0.5rem 1rem 0.5rem 2.4rem;
      outline: none;
      transition: border-color var(--tr), box-shadow var(--tr);
    }

    .header-search input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(226,185,106,0.1);
    }

    .header-search input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 0.85rem;
    }

    /* ─── TOAST ──────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 0.7rem 1.6rem;
      border-radius: 8px;
      color: white;
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 500;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── MODAL ──────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
      transform: scale(0.92);
      transition: transform 0.25s ease;
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal-poster {
      width: 120px;
      height: 176px;
      object-fit: cover;
      border-radius: 8px;
      margin: 0 auto 1.2rem;
      display: block;
      box-shadow: 0 8px 28px rgba(0,0,0,0.6);
    }
    .modal-title {
      font-family: var(--font-head);
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: var(--text);
      margin-bottom: 0.4rem;
    }
    .modal-meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1.4rem;
    }
    .modal-buttons {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ─── LAYOUT ─────────────────────────────────────── */
    .layout {
      max-width: 1340px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 1.75rem;
      align-items: start;
    }

    /* ─── PANEL IZQUIERDO ────────────────────────────── */
    .panel-left {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      position: sticky;
      top: 80px;
    }

    /* ─── FORM CARD ──────────────────────────────────── */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem 1rem;
    }

    .card-title {
      font-family: var(--font-head);
      font-size: 1rem;
      letter-spacing: 2px;
      color: var(--gold);
      margin-bottom: 0.9rem;
    }

    .input-wrap { position: relative; }

    .input-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      padding: 0.62rem 1rem;
      outline: none;
      transition: border-color var(--tr), box-shadow var(--tr);
    }

    .input-wrap input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(226,185,106,0.1);
    }

    .input-wrap input::placeholder { color: var(--muted); }

    .suggestions-container {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      z-index: 200;
      max-height: 210px;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      display: none;
    }

    .suggestion-item {
      padding: 0.58rem 1rem;
      cursor: pointer;
      font-size: 0.87rem;
      color: var(--text);
      transition: background var(--tr);
    }
    .suggestion-item:hover { background: var(--card-hover); }

    .suggestions-container::-webkit-scrollbar { width: 4px; }
    .suggestions-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .btn-primary {
      display: block;
      width: 100%;
      margin-top: 0.7rem;
      padding: 0.62rem 1rem;
      background: var(--gold);
      color: #0b0b0f;
      border: none;
      border-radius: 8px;
      font-family: var(--font-head);
      font-size: 1rem;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: background var(--tr), box-shadow var(--tr), transform var(--tr);
    }
    .btn-primary:hover { background: #f0d08a; box-shadow: 0 0 18px rgba(226,185,106,0.3); }
    .btn-primary:active { transform: scale(0.98); }

    /* ─── LISTA CARD ─────────────────────────────────── */
    .lista-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }

    /* Contador */
    .lista-counter {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
    }
    .counter-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.2rem 0.65rem;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .counter-chip span { color: var(--text); font-weight: 600; }
    .counter-chip.vistas span { color: var(--green); }
    .counter-chip.pendientes span { color: var(--gold); }

    /* Controles: filtro + orden */
    .lista-controles {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.7rem;
      flex-wrap: wrap;
    }

    .ctrl-select {
      flex: 1;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.78rem;
      padding: 0.38rem 0.6rem;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .ctrl-select:focus { border-color: var(--gold-dim); }

    /* Filtros de género */
    .genre-filters {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      margin-bottom: 0.7rem;
    }
    .genre-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.18rem 0.6rem;
      font-size: 0.7rem;
      color: var(--muted);
      cursor: pointer;
      transition: background var(--tr), border-color var(--tr), color var(--tr);
      white-space: nowrap;
    }
    .genre-chip:hover { border-color: var(--gold-dim); color: var(--gold); }
    .genre-chip.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #0b0b0f;
      font-weight: 600;
    }

    #peliculas-lista {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(84px, 1fr));
      gap: 0.55rem;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 2px;
    }

    #peliculas-lista::-webkit-scrollbar { width: 4px; }
    #peliculas-lista::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .pelicula-item {
      background: var(--surface);
      border: 2px solid transparent;
      border-radius: 7px;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: border-color var(--tr), transform var(--tr), box-shadow var(--tr);
    }
    .pelicula-item:hover {
      border-color: var(--gold-dim);
      transform: scale(1.04);
      box-shadow: 0 4px 14px rgba(0,0,0,0.45);
    }
    .pelicula-item.selected {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px var(--gold), 0 4px 18px rgba(226,185,106,0.2);
    }
    .pelicula-item img {
      width: 100%;
      display: block;
      object-fit: cover;
      height: 116px;
    }
    .pelicula-nombre {
      padding: 0.35rem 0.3rem;
      font-size: 0.68rem;
      font-weight: 500;
      text-align: center;
      color: var(--text);
      line-height: 1.3;
    }

    /* Badge "vista" sobre la miniatura */
    .vista-badge {
      position: absolute;
      top: 4px; right: 4px;
      background: var(--green);
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 0.12rem 0.4rem;
      border-radius: 10px;
      letter-spacing: 0.5px;
      pointer-events: none;
    }

    /* ─── DETALLE ────────────────────────────────────── */
    #pelicula-detalle {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 340px;
    }

    .detalle-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 380px;
      gap: 1rem;
      color: var(--muted);
    }

    .play-circle {
      width: 60px; height: 60px;
      background: var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .play-circle::after {
      content: '';
      display: block;
      width: 0; height: 0;
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      border-left: 20px solid var(--muted);
      margin-left: 5px;
    }

    .detalle-hero {
      position: relative;
      width: 100%;
      overflow: hidden;
    }
    .detalle-hero .hero-bg {
      width: 100%;
      height: auto;
      display: block;
      max-height: 500px;
      object-fit: contain;
      object-position: top center;
      filter: brightness(0.55) saturate(0.8);
    }
    .hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--card) 0%, rgba(23,23,31,0.4) 55%, transparent 100%);
    }
    .hero-poster {
      position: absolute;
      bottom: -44px; left: 1.5rem;
      width: 108px; height: 158px;
      object-fit: cover;
      border-radius: 8px;
      border: 3px solid var(--card);
      box-shadow: 0 8px 28px rgba(0,0,0,0.7);
      display: none;
    }

    .detalle-body { padding: 1.5rem 1.5rem 1.5rem 1.5rem; }

    .detalle-title-area {
      margin-bottom: 0.8rem;
      min-height: 44px;
      display: flex;
      align-items: flex-end;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .detalle-title {
      font-family: var(--font-head);
      font-size: 1.95rem;
      letter-spacing: 2px;
      color: var(--text);
      line-height: 1;
    }

    /* Badge vista en detalle */
    .vista-detalle-badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.18rem 0.6rem;
      border-radius: 20px;
      border: 1px solid var(--green-dim);
      color: var(--green);
      white-space: nowrap;
      align-self: center;
    }

    .detalle-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.18rem 0.65rem;
      font-size: 0.73rem;
      color: var(--muted);
    }
    .badge.gold { border-color: var(--gold-dim); color: var(--gold); }

    .detalle-desc {
      font-size: 0.91rem;
      line-height: 1.75;
      color: #a09890;
      margin-bottom: 1.25rem;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem 1.5rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .meta-item label {
      display: block;
      font-size: 0.66rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.12rem;
    }
    .meta-item span { font-size: 0.84rem; color: var(--text); }

    .section-label {
      font-family: var(--font-head);
      font-size: 0.95rem;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 0.65rem;
    }

    .server-buttons {
      display: flex;
      gap: 0.45rem;
      margin-bottom: 0.7rem;
      flex-wrap: wrap;
    }

    .iframe-btn {
      padding: 0.42rem 0.95rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.81rem;
      cursor: pointer;
      transition: background var(--tr), border-color var(--tr), color var(--tr);
    }
    .iframe-btn:hover { background: var(--card-hover); border-color: var(--gold-dim); color: var(--gold); }
    .iframe-btn.active { background: var(--gold); border-color: var(--gold); color: #0b0b0f; font-weight: 600; }

    .video-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .video-container iframe {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .action-buttons {
      display: flex;
      gap: 0.55rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }

    .btn-danger {
      padding: 0.48rem 1rem;
      background: transparent;
      border: 1px solid #5a1a1a;
      border-radius: 7px;
      color: #d07070;
      font-family: var(--font-body);
      font-size: 0.82rem;
      cursor: pointer;
      transition: background var(--tr), border-color var(--tr);
    }
    .btn-danger:hover { background: rgba(200,50,50,0.12); border-color: var(--red); }

    .btn-secondary {
      padding: 0.48rem 1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.82rem;
      cursor: pointer;
      transition: background var(--tr), border-color var(--tr), color var(--tr);
    }
    .btn-secondary:hover { background: var(--card-hover); border-color: var(--gold-dim); color: var(--gold); }

    /* Botón marcar vista — cambia estilo según estado */
    .btn-vista {
      padding: 0.48rem 1rem;
      background: transparent;
      border: 1px solid var(--green-dim);
      border-radius: 7px;
      color: var(--green);
      font-family: var(--font-body);
      font-size: 0.82rem;
      cursor: pointer;
      transition: background var(--tr), border-color var(--tr);
    }
    .btn-vista:hover { background: rgba(76,175,125,0.12); }
    .btn-vista.marcada {
      background: rgba(76,175,125,0.15);
      border-color: var(--green);
    }

    /* ─── FOOTER ─────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 1.75rem;
      color: var(--muted);
      font-size: 0.78rem;
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }

    /* ─── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .panel-left { position: static; }
      #peliculas-lista { max-height: 270px; }
      .meta-grid { grid-template-columns: 1fr; }
      .header-search { width: 170px; }
      .btn-random-header { font-size: 0.82rem; padding: 0.38rem 0.7rem; }
    }

    @media (max-width: 560px) {
      header { padding: 0 1rem; gap: 0.5rem; }
      .header-search { display: none; }
      .layout { padding: 1rem; }
    }

    /* ─── TOGGLE PELÍCULA / SERIE ────────────────────── */
    .type-toggle {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }
    .type-btn {
      flex: 1;
      padding: 0.38rem 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 0.8rem;
      cursor: pointer;
      transition: background var(--tr), border-color var(--tr), color var(--tr);
    }
    .type-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
    .type-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #0b0b0f;
      font-weight: 600;
    }

    /* Badge tipo en miniatura */
    .tipo-badge {
      position: absolute;
      top: 4px; left: 4px;
      background: #1a3a6e;
      color: #7ab8ff;
      font-size: 0.55rem;
      font-weight: 700;
      padding: 0.1rem 0.35rem;
      border-radius: 10px;
      letter-spacing: 0.5px;
      pointer-events: none;
    }

    /* Selector temporada/episodio */
    .episode-selector {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.7rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .episode-selector select {
      flex: 1;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.8rem;
      padding: 0.38rem 0.6rem;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .episode-selector select:focus { border-color: var(--gold-dim); }
    .episode-info {
      font-size: 0.75rem;
      color: var(--muted);
      width: 100%;
      margin-top: -0.2rem;
    }

    /* ─── ÚLTIMO EPISODIO VISTO ──────────────────────── */
    .ultimo-visto-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,200,60,0.07);

  <script>
    // ── VARIABLES GLOBALES ───────────────────────────────
    let peliculasData       = [];
    let fuse                = null;
    let entradaSeleccionada = null;
    let gifIndiceActual     = 0;
    let tipoEntrada         = 'movie';
    let amigosVistasCache   = {};

    // DOM refs (disponibles después de DOMContentLoaded)
    let detallePeliculas, listaContainer, searchInput, searchSugg;
    let episodiosCache      = {};

    const OMDB_API_KEY    = 'c7b893ce';
    const TMDB_API_KEY    = '8e21dd703e7130cc62b5cf2edad806fa';
    const TENOR_API_KEY   = 'AIzaSyBMX5wwWOWfL5EKrK2CbLeEJyJnyLI8gyQ';

    // ── SUPABASE CONFIG ─────────────────────────────────
    const SUPABASE_URL = 'https://xvptomvtpijlwnhozcnj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2cHRvbXZ0cGlqbHduaG96Y25qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NjE2NzAsImV4cCI6MjA5NjMzNzY3MH0.FudMyaPkK5HH1ymYI2j9q6Yue9nMFPnTXXVILVTOEqs';

    const sbFetch = (path, opts = {}) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      ...opts,
      headers: {
        'apikey': SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': opts.prefer || '',
        ...(usuarioActual ? { 'Authorization': `Bearer ${usuarioActual.access_token}` } : { 'Authorization': `Bearer ${SUPABASE_KEY}` }),
        ...(opts.headers || {})
      }
    });

    // ── AUTH STATE ───────────────────────────────────────
    let usuarioActual = null; // { id, email, nombre, avatar, access_token }

    async function obtenerSesion() {
      const res  = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${getToken()}` }
      });
      if (!res.ok) return null;
      const data = await res.json();
      return data?.id ? data : null;
    }

    function getToken()  { return localStorage.getItem('sb_token') || ''; }
    function setToken(t) { localStorage.setItem('sb_token', t); }
    function clearToken(){ localStorage.removeItem('sb_token'); }

    // Callback global que llama Google One Tap
    window.handleSignInWithGoogle = async (response) => {
      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=id_token`, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ provider: 'google', id_token: response.credential })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error_description || data.error);
        setToken(data.access_token);
        usuarioActual = {
          id:           data.user.id,
          email:        data.user.email,
          nombre:       data.user.user_metadata?.full_name || data.user.email,
          avatar:       data.user.user_metadata?.avatar_url || '',
          access_token: data.access_token
        };
        await upsertPerfil();
        mostrarUILogueado();
        await cargarPeliculas();
      } catch (err) {
        mostrarNotificacion('❌ Error al iniciar sesión: ' + err.message, false);
      }
    };

    async function upsertPerfil() {
      if (!usuarioActual) return;
      await sbFetch('perfiles', {
        method: 'POST',
        prefer: 'resolution=merge-duplicates',
        body: JSON.stringify({ user_id: usuarioActual.id, nombre: usuarioActual.nombre, avatar: usuarioActual.avatar })
      });
    }

    async function cerrarSesion() {
      clearToken();
      usuarioActual = null;
      peliculasData = [];
      mostrarUIDeslogueado();
    }

    function mostrarUILogueado() {
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('app-container').style.display = '';
      // Init DOM refs now that app-container is visible
      detallePeliculas = document.getElementById('detalle-peliculas');
      listaContainer   = document.getElementById('lista-container');
      searchInput      = document.getElementById('search-input');
      searchSugg       = document.getElementById('search-suggestions');
      const av = document.getElementById('user-avatar');
      const nm = document.getElementById('user-nombre');
      if (av) av.src = usuarioActual.avatar || '';
      if (nm) nm.textContent = usuarioActual.nombre || usuarioActual.email;
    }

    function mostrarUIDeslogueado() {
      const overlay = document.getElementById('login-overlay');
      const app     = document.getElementById('app-container');
      if (overlay) overlay.style.display = 'flex';
      if (app)     app.style.display = 'none';
      peliculasData = [];
      detallePeliculas = detallePeliculas || document.getElementById('detalle-peliculas');
      if (detallePeliculas) detallePeliculas.innerHTML = '';
    }

    // ── DB: CATÁLOGO (por usuario) ───────────────────────
    async function dbLeer() {
      const res  = await sbFetch(`catalogo?user_id=eq.${usuarioActual.id}&order=created_at.asc`);
      const rows = await res.json();
      return Array.isArray(rows) ? rows.map(r => r.data) : [];
    }

    async function dbGuardar(arr) {
      // Diff: delete all then re-insert is costly; instead we sync individually
      // But for simplicity (small catalogs) we do a full replace:
      // 1) delete existing rows for this user
      await sbFetch(`catalogo?user_id=eq.${usuarioActual.id}`, { method: 'DELETE' });
      // 2) insert all
      if (!arr.length) return;
      const rows = arr.map(item => ({ id: item.id, user_id: usuarioActual.id, data: item }));
      await sbFetch('catalogo', {
        method: 'POST',
        prefer: 'resolution=merge-duplicates',
        body: JSON.stringify(rows)
      });
    }

    async function dbAgregarItem(item) {
      await sbFetch('catalogo', {
        method: 'POST',
        prefer: 'resolution=merge-duplicates',
        body: JSON.stringify({ id: item.id, user_id: usuarioActual.id, data: item })
      });
    }

    async function dbEliminarItem(id) {
      await sbFetch(`catalogo?id=eq.${id}&user_id=eq.${usuarioActual.id}`, { method: 'DELETE' });
    }

    async function dbActualizarItem(item) {
      await sbFetch(`catalogo?id=eq.${item.id}&user_id=eq.${usuarioActual.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ data: item })
      });
    }

    function generarID() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    // ── VISTAS (en Supabase, públicas) ──────────────────
    async function getVistasUsuario() {
      if (!usuarioActual) return {};
      const res  = await sbFetch(`vistas?user_id=eq.${usuarioActual.id}`);
      const rows = await res.json();
      if (!Array.isArray(rows)) return {};
      const map = {};
      rows.forEach(r => { map[r.item_id] = { visto: r.visto, ultimo_ep: r.ultimo_ep }; });
      return map;
    }

    // Cache local de vistas para no pedir a Supabase en cada render
    let vistasCache = {};

    async function recargarVistasCache() {
      vistasCache = await getVistasUsuario();
    }

    function estaVista(id) { return !!vistasCache[id]?.visto; }

    async function setVista(id, valor) {
      vistasCache[id] = { ...( vistasCache[id] || {}), visto: valor };
      await sbFetch('vistas', {
        method: 'POST',
        prefer: 'resolution=merge-duplicates',
        body: JSON.stringify({ user_id: usuarioActual.id, item_id: id, visto: valor })
      });
    }

    // ── ÚLTIMO EPISODIO (Supabase) ──────────────────────
    function getUltimoEp(serieId) {
      return vistasCache[serieId]?.ultimo_ep || null;
    }

    async function setUltimoEp(serieId, season, episode, epName) {
      const ep = { season, episode, epName: epName || '' };
      vistasCache[serieId] = { ...(vistasCache[serieId] || {}), ultimo_ep: ep };
      await sbFetch('vistas', {
        method: 'POST',
        prefer: 'resolution=merge-duplicates',
        body: JSON.stringify({ user_id: usuarioActual.id, item_id: serieId, ultimo_ep: ep })
      });
    }

    // ── AMIGOS: ver vistas de otros ──────────────────────
    async function cargarVistasAmigos() {
      const [vistasRes, perfilesRes] = await Promise.all([
        sbFetch('vistas?visto=eq.true&select=user_id,item_id'),
        sbFetch('perfiles?select=user_id,nombre,avatar')
      ]);
      const vistas   = await vistasRes.json();
      const perfiles = await perfilesRes.json();
      if (!Array.isArray(vistas) || !Array.isArray(perfiles)) return;

      const perfilMap = {};
      perfiles.forEach(p => { perfilMap[p.user_id] = p; });

      // Agrupar por item_id, excluir al usuario actual
      const porItem = {};
      vistas.forEach(v => {
        if (v.user_id === usuarioActual?.id) return;
        if (!porItem[v.item_id]) porItem[v.item_id] = [];
        const perfil = perfilMap[v.user_id];
        if (perfil) porItem[v.item_id].push(perfil);
      });
      return porItem;
    }

    // ── IMPORTAR DESDE JSONBIN ───────────────────────────
    async function importarDesdeJSON(jsonStr) {
      try {
        let arr = JSON.parse(jsonStr);
        if (!Array.isArray(arr)) throw new Error('El JSON debe ser un array');
        arr = arr.filter(x => x && typeof x === 'object' && x.id);
        if (!arr.length) throw new Error('No se encontraron items válidos');
        // Asegurar que todos tengan type
        arr = arr.map(x => ({ ...x, type: x.type || 'movie' }));
        const rows = arr.map(item => ({ id: item.id, user_id: usuarioActual.id, data: item }));
        await sbFetch('catalogo', {
          method: 'POST',
          prefer: 'resolution=merge-duplicates',
          body: JSON.stringify(rows)
        });
        mostrarNotificacion(`✅ ${arr.length} items importados`);
        await cargarPeliculas();
        document.getElementById('modal-importar').style.display = 'none';
      } catch (err) {
        mostrarNotificacion('❌ Error al importar: ' + err.message, false);
      }
    }

    // ── TOAST ────────────────────────────────────────────
    function mostrarNotificacion(texto, exito = true) {
      const toast = document.getElementById('toast');
      toast.textContent = texto;
      toast.style.background = exito ? '#2d6e45' : '#7a1a1a';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ── CARGAR PELÍCULAS ─────────────────────────────────
    async function cargarPeliculas() {
      try {
        [peliculasData] = await Promise.all([dbLeer(), recargarVistasCache()]);
        fuse = new Fuse(peliculasData, { keys: ['name', 'type'], threshold: 0.4 });
        construirFiltrosGenero();
        aplicarFiltros();
        detallePeliculas.innerHTML = `
          <div class="detalle-placeholder">
            <div class="play-circle"></div>
            <p>Seleccioná una película o serie para ver los detalles</p>
          </div>`;
        // Cargar badges de amigos
        amigosVistasCache = await cargarVistasAmigos() || {};
      } catch (err) {
        detallePeliculas.innerHTML = `<div class="detalle-placeholder"><p>Error cargando. ¿Estás logueado?</p></div>`;
        console.error(err);
      }
    }

    // ── GÉNEROS ÚNICOS ───────────────────────────────────
    let generoActivo = 'todos';

    function construirFiltrosGenero() {
      const generos = new Set();
      peliculasData.forEach(p => {
        if (p.genre) p.genre.split(',').forEach(g => generos.add(g.trim()));
      });

      const cont = document.getElementById('genre-filters');
      cont.innerHTML = '';

      const all = document.createElement('button');
      all.className = 'genre-chip active';
      all.textContent = 'Todos';
      all.onclick = () => { generoActivo = 'todos'; actualizarChipsGenero(all); aplicarFiltros(); };
      cont.appendChild(all);

      [...generos].sort().forEach(g => {
        const chip = document.createElement('button');
        chip.className = 'genre-chip';
        chip.textContent = g;
        chip.onclick = () => { generoActivo = g; actualizarChipsGenero(chip); aplicarFiltros(); };
        cont.appendChild(chip);
      });
    }

    function actualizarChipsGenero(activo) {
      document.querySelectorAll('.genre-chip').forEach(c => c.classList.remove('active'));
      activo.classList.add('active');
    }

    // ── FILTRAR + ORDENAR ────────────────────────────────
    function aplicarFiltros() {
      const orden    = document.getElementById('orden-select').value;
      const vistaFlt = document.getElementById('vista-select').value;

      let lista = [...peliculasData];

      // Filtro género
      if (generoActivo !== 'todos') {
        lista = lista.filter(p => p.genre && p.genre.split(',').map(g => g.trim()).includes(generoActivo));
      }

      // Filtro vistas/pendientes
      if (vistaFlt === 'vistas')     lista = lista.filter(p => estaVista(p.id));
      if (vistaFlt === 'pendientes') lista = lista.filter(p => !estaVista(p.id));

      // Ordenar
      if (orden === 'nombre')       lista.sort((a,b) => a.name.localeCompare(b.name));
      if (orden === 'nombre-desc')  lista.sort((a,b) => b.name.localeCompare(a.name));
      if (orden === 'rating')       lista.sort((a,b) => (parseFloat(b.rating) || 0) - (parseFloat(a.rating) || 0));
      if (orden === 'año')          lista.sort((a,b) => extraerAño(b) - extraerAño(a));
      if (orden === 'año-asc')      lista.sort((a,b) => extraerAño(a) - extraerAño(b));

      renderizarLista(lista);
      actualizarContador();
    }

    function extraerAño(p) {
      if (!p.release) return 0;
      const m = p.release.match(/\d{4}/);
      return m ? parseInt(m[0]) : 0;
    }

    // ── CONTADOR ─────────────────────────────────────────
    function actualizarContador() {
      const total     = peliculasData.length;
      const vistas    = peliculasData.filter(p => estaVista(p.id)).length;
      const pendientes = total - vistas;
      document.getElementById('lista-counter').innerHTML = `
        <div class="counter-chip"><span>${total}</span> total</div>
        <div class="counter-chip vistas"><span>${vistas}</span> vistas</div>
        <div class="counter-chip pendientes"><span>${pendientes}</span> pendientes</div>`;
    }

    // ── RENDERIZAR LISTA ─────────────────────────────────
    function renderizarLista(peliculas) {
      listaPeliculas.innerHTML = '';
      if (!peliculas.length) {
        listaPeliculas.innerHTML = '<p style="color:var(--muted);font-size:0.8rem;padding:0.5rem;">Sin resultados</p>';
        return;
      }
      peliculas.forEach((pelicula) => {
        const indexReal = peliculasData.findIndex(p => p.id === pelicula.id);
        const portada   = pelicula.cover && pelicula.cover.trim() !== ''
          ? pelicula.cover : 'https://via.placeholder.com/88x120?text=?';
        const vista     = estaVista(pelicula.id);

        const div = document.createElement('div');
        div.classList.add('pelicula-item');
        div.dataset.id = indexReal;
        div.innerHTML = `
          <img src="${portada}" alt="${pelicula.name}" loading="lazy" />
          ${vista ? '<div class="vista-badge">✔ Vista</div>' : ''}
          ${pelicula.type === 'tv' ? '<div class="tipo-badge">SERIE</div>' : ''}
          <div class="pelicula-nombre" translate="no">${pelicula.name}</div>`;
        div.addEventListener('click', () => mostrarDetalle(indexReal));
        listaPeliculas.appendChild(div);
      });
    }

    // ── MOSTRAR DETALLE ──────────────────────────────────
    function mostrarDetalle(index) {
      document.querySelectorAll('.pelicula-item').forEach(el => {
        el.classList.toggle('selected', parseInt(el.dataset.id) === index);
      });
      const selected = document.querySelector('.pelicula-item.selected');
      if (selected) selected.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

      const p = peliculasData[index];
      if (!p) return;

      episodiosCache = {};

      const cover   = p.cover && p.cover !== 'N/A' && p.cover.trim() ? p.cover : '';
      const gifUrl  = p.gif  && p.gif.trim() ? p.gif : '';
      const hero    = gifUrl || cover;
      const vista   = estaVista(p.id);
      const esSerie = p.type === 'tv';
      const safeImdb = (p.imdbID || '').replace(/'/g, '');
      const safeTmdb = (p.tmdbID ? String(p.tmdbID) : '');
      const safeName = (p.name  || '').replace(/'/g, "\\'");

      const episodioHTML = esSerie ? `
        <div id="ultimo-visto-bar" class="ultimo-visto-bar" style="display:none"></div>
        <div class="ep-search-wrap">
          <span class="ep-search-icon">🔍</span>
          <input type="text" id="ep-search" placeholder="Buscar episodio por nombre o número..." autocomplete="off" />
          <div id="ep-results" class="ep-results"></div>
        </div>
        <div class="episode-selector">
          <select id="sel-temporada"></select>
          <select id="sel-episodio"></select>
          <div class="episode-info" id="ep-info"></div>
        </div>` : '';

      detallePeliculas.innerHTML = `
        <div class="detalle-hero">
          ${hero ? `<img class="hero-bg" src="${hero}" alt="" />` : '<div class="hero-bg" style="background:var(--surface);width:100%;height:100%;display:block;"></div>'}
          <div class="hero-gradient"></div>
          ${cover ? `<img class="hero-poster" src="${cover}" alt="${p.name}" />` : ''}
        </div>
        <div class="detalle-body">
          <div class="detalle-title-area">
            <h2 class="detalle-title" translate="no">${p.name}</h2>
            ${esSerie ? '<span class="badge" style="border-color:#1a3a6e;color:#7ab8ff;align-self:center;">📺 Serie</span>' : ''}
            ${vista ? '<span class="vista-detalle-badge">✔ Vista</span>' : ''}
          </div>
          <div class="detalle-badges">
            ${p.genre   ? p.genre.split(',').map(g => `<span class="badge">${g.trim()}</span>`).join('') : ''}
            ${p.rating  && p.rating   !== 'N/A' ? `<span class="badge gold">⭐ ${p.rating}</span>` : ''}
            ${!esSerie  && p.duration && p.duration !== 'N/A' ? `<span class="badge">${p.duration}</span>` : ''}
            ${esSerie   && p.seasons  ? `<span class="badge">${p.seasons.length} temporadas</span>` : ''}
          </div>
          ${p.description ? `<p class="detalle-desc">${p.description}</p>` : ''}
          <div class="meta-grid">
            ${p.release  && p.release  !== 'N/A' ? `<div class="meta-item"><label>Lanzamiento</label><span>${p.release}</span></div>` : ''}
            ${!esSerie && p.director && p.director !== 'N/A' ? `<div class="meta-item"><label>Director</label><span>${p.director}</span></div>` : ''}
            ${p.language && p.language !== 'N/A' ? `<div class="meta-item"><label>Idioma</label><span>${p.language}</span></div>` : ''}
            ${p.country  && p.country  !== 'N/A' ? `<div class="meta-item"><label>País</label><span>${p.country}</span></div>` : ''}
            ${!esSerie && p.actors && p.actors !== 'N/A' ? `<div class="meta-item" style="grid-column:1/-1"><label>Actores</label><span>${p.actors}</span></div>` : ''}
            ${!esSerie && p.awards && p.awards !== 'N/A' ? `<div class="meta-item" style="grid-column:1/-1"><label>Premios</label><span>${p.awards}</span></div>` : ''}
          </div>
          <p class="section-label">${esSerie ? 'VER SERIE' : 'VER PELÍCULA'}</p>
          ${episodioHTML}
          <div class="server-buttons">
            ${!esSerie ? `<button class="iframe-btn" data-servidor="embed69"  onclick="reproducir('embed69','${safeImdb}',this)">Embed69</button>` : ''}
            ${!esSerie ? `<button class="iframe-btn" data-servidor="xupalace" onclick="reproducir('xupalace','${safeImdb}',this)">Xupalace</button>` : ''}
            <button class="iframe-btn" data-servidor="vidsrc"      onclick="reproducir('vidsrc','${safeImdb}',this)">VidSrc</button>
            <button class="iframe-btn" data-servidor="autoembed"   onclick="reproducir('autoembed','${safeTmdb}',this)">AutoEmbed</button>
            <button class="iframe-btn" data-servidor="2embed"      onclick="reproducir('2embed','${safeTmdb}',this)">2Embed</button>
            <button class="iframe-btn" data-servidor="multiembed"  onclick="reproducir('multiembed','${safeTmdb}',this)">MultiEmbed</button>
            <button class="iframe-btn" data-servidor="embedsu"     onclick="reproducir('embedsu','${safeTmdb}',this)">Embed.su</button>
            <button class="iframe-btn" data-servidor="vidlink"     onclick="reproducir('vidlink','${safeTmdb}',this)">VidLink</button>
            <button class="iframe-btn" onclick="verTrailer('${safeName}')">▶ Trailer</button>
          </div>
          <div class="video-container">
            <iframe id="iframe-player" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
          </div>
          ${(() => {
            const amigos = amigosVistasCache[p.id] || [];
            return amigos.length ? `<div class="amigos-vieron">
              <span class="amigos-label">👀 Visto por:</span>
              ${amigos.map(a => `<span class="amigo-chip" title="${a.nombre}">
                ${a.avatar ? `<img src="${a.avatar}" />` : ''}${a.nombre.split(' ')[0]}
              </span>`).join('')}
            </div>` : '';
          })()}
          <div class="action-buttons">
            <button class="btn-vista ${vista ? 'marcada' : ''}" id="btn-vista"
              onclick="toggleVista('${p.id}', ${index})">
              ${vista ? '✔ Marcar como no vista' : '○ Marcar como vista'}
            </button>
            ${esSerie ? `<button class="btn-secondary" id="btn-marcar-ep"
              data-serie-id="${p.id}" data-season="" data-episode="" data-name=""
              onclick="marcarEpisodioVisto(this)">📌 Marcar episodio como visto</button>` : ''}
            <button class="btn-secondary" id="btn-traducir" onclick="traducirDetalle()">🌐 Traducir</button>
            <button class="btn-secondary" onclick="cambiarGIF(peliculasData[${index}])">🔄 Cambiar GIF</button>
            <button class="btn-danger" onclick="eliminarPelicula('${p.id}')">🗑 Eliminar</button>
          </div>
        </div>`;

      if (esSerie && p.seasons && p.seasons.length) {
        cargarTemporadas(p, safeImdb);
      }
    }

    // Wrapper que lee season/episode actuales si están presentes
    // Para series: servidores basados en TMDB usan tmdbID, vidsrc usa imdbID
    function reproducir(servidor, id, btn) {
      const selT = document.getElementById('sel-temporada');
      const selE = document.getElementById('sel-episodio');
      if (selT && selE) {
        cargarServidor(servidor, id, btn, parseInt(selT.value), parseInt(selE.value));
      } else {
        cargarServidor(servidor, id, btn);
      }
    }

    function marcarEpisodioVisto(btn) {
      const s    = parseInt(btn.dataset.season);
      const e    = parseInt(btn.dataset.episode);
      const name = btn.dataset.name || '';
      const id   = btn.dataset.serieId;
      if (!s || !e || !id) { mostrarNotificacion('Seleccioná un episodio primero', false); return; }
      setUltimoEp(id, s, e, name);
      mostrarNotificacion(`📌 Guardado: T${s} E${e}`);
      const serie = peliculasData.find(p => p.id === id);
      if (serie) renderUltimoVisto(serie);
    }

    // ── VISTO / NO VISTO ─────────────────────────────────
    async function toggleVista(id, index) {
      const nuevoEstado = !estaVista(id);
      await setVista(id, nuevoEstado);
      mostrarNotificacion(nuevoEstado ? '✔ Marcada como vista' : '○ Marcada como pendiente');
      // Refrescar el botón y el badge sin redibujar todo el detalle
      const btn = document.getElementById('btn-vista');
      if (btn) {
        btn.textContent = nuevoEstado ? '✔ Marcar como no vista' : '○ Marcar como vista';
        btn.classList.toggle('marcada', nuevoEstado);
      }
      // Actualizar badge en título
      const badgeDetalle = document.querySelector('.vista-detalle-badge');
      const titleArea = document.querySelector('.detalle-title-area');
      if (nuevoEstado && titleArea && !badgeDetalle) {
        const b = document.createElement('span');
        b.className = 'vista-detalle-badge';
        b.textContent = '✔ Vista';
        titleArea.appendChild(b);
      } else if (!nuevoEstado && badgeDetalle) {
        badgeDetalle.remove();
      }
      // Actualizar lista
      aplicarFiltros();
    }

    // ── TRAILER ─────────────────────────────────────────
    function verTrailer(nombre) {
      const query   = encodeURIComponent(nombre + ' trailer oficial');
      const ytSearch = `https://www.youtube.com/results?search_query=${query}`;
      // Intentamos cargar en el iframe el primer resultado vía embed — usamos YouTube nocookie
      // Como no tenemos API key de YouTube, abrimos directamente en nueva pestaña
      window.open(ytSearch, '_blank');
    }

    // ── ¿QUÉ MIRO HOY? ──────────────────────────────────
    function peliculaAleatoria() {
      const pendientes = peliculasData.filter(p => !estaVista(p.id));
      const pool       = pendientes.length > 0 ? pendientes : peliculasData;
      if (!pool.length) { mostrarNotificacion('No hay películas cargadas', false); return; }

      const p = pool[Math.floor(Math.random() * pool.length)];
      peliculaRandomActual = peliculasData.findIndex(x => x.id === p.id);

      document.getElementById('modal-poster').src  = p.cover || '';
      document.getElementById('modal-titulo').textContent = p.name;
      document.getElementById('modal-meta').textContent  =
        [p.genre, p.duration, p.rating !== 'N/A' ? '⭐ ' + p.rating : ''].filter(Boolean).join(' · ');

      document.getElementById('modal-random').classList.add('open');
    }

    function cerrarModal() {
      document.getElementById('modal-random').classList.remove('open');
    }

    function irApelicula() {
      cerrarModal();
      if (peliculaRandomActual !== null) mostrarDetalle(peliculaRandomActual);
    }

    // Cerrar modal clickando afuera
    document.getElementById('modal-random').addEventListener('click', function(e) {
      if (e.target === this) cerrarModal();
    });

    // ── SERVIDORES ───────────────────────────────────────
    // imdbID  → vidsrc, embed69, xupalace
    // tmdbID  → autoembed, 2embed, multiembed, embedsu, vidlink
    function cargarServidor(servidor, id, btn, season, episode) {
      document.querySelectorAll('.iframe-btn').forEach(b => b.classList.remove('active'));
      if (btn) { btn.classList.add('active'); btn.dataset.servidor = servidor; }

      const tv = season !== undefined && episode !== undefined;
      let url = '';

      if (servidor === 'embed69')   url = tv ? '' : `https://embed69.org/f/${id}/`;
      if (servidor === 'xupalace')  url = tv ? '' : `https://xupalace.org/video/${id}/`;
      if (servidor === 'vidsrc')    url = tv
        ? `https://vidsrc.me/embed/tv?imdb=${id}&season=${season}&episode=${episode}`
        : `https://vidsrc.me/embed/movie?imdb=${id}`;
      if (servidor === 'autoembed') url = tv
        ? `https://player.autoembed.cc/embed/tv/${id}/${season}/${episode}`
        : `https://player.autoembed.cc/embed/movie/${id}`;
      if (servidor === '2embed')    url = tv
        ? `https://www.2embed.cc/embedtv/${id}&s=${season}&e=${episode}`
        : `https://www.2embed.cc/embed/${id}`;
      if (servidor === 'multiembed') url = tv
        ? `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${season}&e=${episode}`
        : `https://multiembed.mov/?video_id=${id}&tmdb=1`;
      if (servidor === 'embedsu')   url = tv
        ? `https://embed.su/embed/tv/${id}/${season}/${episode}`
        : `https://embed.su/embed/movie/${id}`;
      if (servidor === 'vidlink')   url = tv
        ? `https://vidlink.pro/tv/${id}?s=${season}&ep=${episode}`
        : `https://vidlink.pro/movie/${id}`;

      document.getElementById('iframe-player').src = url;
    }

    // ── ELIMINAR ─────────────────────────────────────────
    async function eliminarPelicula(id) {
      if (!confirm('¿Seguro que querés eliminar esto?')) return;
      try {
        await dbEliminarItem(id);
        mostrarNotificacion('🗑️ Eliminado');
        await cargarPeliculas();
        detallePeliculas.innerHTML = `<div class="detalle-placeholder"><div class="play-circle"></div><p>Seleccioná una película o serie para ver los detalles</p></div>`;
      } catch (err) {
        mostrarNotificacion('❌ Error al eliminar: ' + err.message, false);
      }
    }

    // ── GIF ──────────────────────────────────────────────
    async function buscarGIFsTenor(nombre, limit = 5) {
      try {
        const res  = await fetch(`https://tenor.googleapis.com/v2/search?q=${encodeURIComponent(nombre)}&key=${TENOR_API_KEY}&limit=${limit}&media_filter=gif`);
        const data = await res.json();
        return data.results.map(r => r.media_formats?.gif?.url).filter(Boolean);
      } catch { return []; }
    }

    async function buscarGIF(nombre) {
      const gifs = await buscarGIFsTenor(nombre, 1);
      return gifs[0] || '';
    }

    async function cambiarGIF(pelicula) {
      if (!pelicula?.name) return;
      const gifs = await buscarGIFsTenor(pelicula.name, 5);
      if (!gifs.length) return;
      gifIndiceActual = (gifIndiceActual + 1) % gifs.length;
      pelicula.gif = gifs[gifIndiceActual];
      const heroBg = document.querySelector('.hero-bg');
      if (heroBg) heroBg.src = pelicula.gif;
      try { await dbActualizarItem(pelicula); } catch { /* silencioso */ }
    }

    // ── TRADUCIR ─────────────────────────────────────────
    async function traducirTexto(texto) {
      if (!texto || texto.trim() === '') return texto;
      try {
        const url  = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=es&dt=t&q=${encodeURIComponent(texto)}`;
        const res  = await fetch(url);
        const data = await res.json();
        return data[0].map(seg => seg[0]).join('');
      } catch { return texto; }
    }

    async function traducirDetalle() {
      const btn = document.getElementById('btn-traducir');
      if (!btn) return;
      btn.disabled = true;
      btn.textContent = '⏳ Traduciendo...';

      const desc = document.querySelector('.detalle-desc');
      if (desc) desc.textContent = await traducirTexto(desc.textContent);

      const metaSpans = document.querySelectorAll('.meta-item span');
      for (const span of metaSpans) span.textContent = await traducirTexto(span.textContent);

      const badges = document.querySelectorAll('.badge:not(.gold)');
      for (const badge of badges) badge.textContent = await traducirTexto(badge.textContent);

      btn.textContent = '✅ Traducido';
    }

    // ── BUSCADOR HEADER ──────────────────────────────────
    const searchInput = document.getElementById('search-input');
    const searchSugg  = document.getElementById('search-suggestions');

    searchInput.addEventListener('input', function () {
      const q = this.value.trim();
      searchSugg.innerHTML = '';
      if (!fuse || q === '') { searchSugg.style.display = 'none'; return; }
      const resultados = fuse.search(q).slice(0, 6);
      if (!resultados.length) { searchSugg.style.display = 'none'; return; }
      searchSugg.style.display = 'block';
      resultados.forEach(({ item }) => {
        const el = document.createElement('div');
        el.className = 'suggestion-item';
        el.textContent = item.name;
        el.onclick = () => {
          const i = peliculasData.findIndex(p => p.id === item.id);
          if (i !== -1) { mostrarDetalle(i); searchSugg.style.display = 'none'; searchInput.value = item.name; }
        };
        searchSugg.appendChild(el);
      });
    });

    document.addEventListener('click', e => {
      if (!searchInput.contains(e.target) && !searchSugg.contains(e.target))
        searchSugg.style.display = 'none';
    });

    // ── FORMULARIO AGREGAR ───────────────────────────────
    const entradaInput = document.getElementById('entradaPelicula');
    const entradaSugg  = document.getElementById('entrada-suggestions');

    entradaInput.addEventListener('input', async function () {
      const q = this.value.trim();
      entradaSugg.innerHTML = '';
      entradaSeleccionada = null;
      if (q.length < 3) { entradaSugg.style.display = 'none'; return; }
      try {
        if (tipoEntrada === 'movie') {
          const res  = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&s=${encodeURIComponent(q)}&type=movie`);
          const data = await res.json();
          if (data.Response === 'True' && data.Search?.length) {
            entradaSugg.style.display = 'block';
            data.Search.slice(0, 7).forEach(m => {
              const el = document.createElement('div');
              el.className = 'suggestion-item';
              el.textContent = m.Title + (m.Year ? ` (${m.Year})` : '');
              el.onclick = async () => {
                entradaSeleccionada = await buscarOMDbPorID(m.imdbID);
                entradaInput.value  = entradaSeleccionada.Title;
                entradaSugg.style.display = 'none';
              };
              entradaSugg.appendChild(el);
            });
          } else { entradaSugg.style.display = 'none'; }
        } else {
          // Búsqueda de series vía TMDB
          const resultados = await buscarTMDBSeries(q);
          if (resultados.length) {
            entradaSugg.style.display = 'block';
            resultados.slice(0, 7).forEach(s => {
              const el = document.createElement('div');
              el.className = 'suggestion-item';
              el.textContent = s.name + (s.first_air_date ? ` (${s.first_air_date.slice(0,4)})` : '');
              el.onclick = async () => {
                entradaSeleccionada = await buscarTMDBSerieByID(s.id);
                entradaInput.value  = entradaSeleccionada.name;
                entradaSugg.style.display = 'none';
              };
              entradaSugg.appendChild(el);
            });
          } else { entradaSugg.style.display = 'none'; }
        }
      } catch { entradaSugg.style.display = 'none'; }
    });

    document.addEventListener('click', e => {
      if (!entradaInput.contains(e.target) && !entradaSugg.contains(e.target))
        entradaSugg.style.display = 'none';
    });

    async function buscarOMDbPorID(id) {
      const res  = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&i=${id}&plot=full`);
      const data = await res.json();
      if (data.Response === 'False') throw new Error('No encontrada');
      return data;
    }

    async function buscarOMDbPorTitulo(titulo) {
      const res  = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_API_KEY}&t=${encodeURIComponent(titulo)}&plot=full`);
      const data = await res.json();
      if (data.Response === 'False') throw new Error('No encontrada en OMDb');
      return data;
    }

    document.getElementById('guardarPeliculaBtn').addEventListener('click', async () => {
      const titulo = entradaInput.value.trim();
      if (!titulo) { mostrarNotificacion('Escribí el nombre de una película o serie', false); return; }
      try {
        mostrarNotificacion('⏳ Buscando...', true);
        let data;

        if (tipoEntrada === 'movie') {
          const omdb = entradaSeleccionada || await buscarOMDbPorTitulo(titulo);
          const gif  = await buscarGIF(omdb.Title);
          // Obtener tmdbID desde TMDB para reproductores que lo requieren
          let tmdbIDPelicula = '';
          try {
            const tr = await fetch(`https://api.themoviedb.org/3/find/${omdb.imdbID}?api_key=${TMDB_API_KEY}&external_source=imdb_id`);
            const td = await tr.json();
            tmdbIDPelicula = td.movie_results?.[0]?.id ? String(td.movie_results[0].id) : '';
          } catch { /* silencioso */ }
          data = {
            id:          generarID(),
            type:        'movie',
            name:        omdb.Title,
            description: omdb.Plot,
            cover:       omdb.Poster !== 'N/A' ? omdb.Poster : '',
            duration:    omdb.Runtime,
            release:     omdb.Released,
            director:    omdb.Director,
            rating:      omdb.imdbRating,
            genre:       omdb.Genre,
            language:    omdb.Language,
            country:     omdb.Country,
            actors:      omdb.Actors,
            awards:      omdb.Awards,
            gif,
            imdbID:      omdb.imdbID,
            tmdbID:      tmdbIDPelicula
          };
        } else {
          // Serie vía TMDB
          let tmdb = entradaSeleccionada;
          if (!tmdb) {
            const res = await buscarTMDBSeries(titulo);
            if (!res.length) throw new Error('Serie no encontrada en TMDB');
            tmdb = await buscarTMDBSerieByID(res[0].id);
          }
          const imdbID  = tmdb.external_ids?.imdb_id || '';
          const poster  = tmdb.poster_path ? `https://image.tmdb.org/t/p/w500${tmdb.poster_path}` : '';
          const gif     = await buscarGIF(tmdb.name);
          const seasons = (tmdb.seasons || [])
            .filter(s => s.season_number > 0)
            .map(s => ({ season_number: s.season_number, episode_count: s.episode_count }));
          data = {
            id:           generarID(),
            type:         'tv',
            name:         tmdb.name,
            description:  tmdb.overview,
            cover:        poster,
            release:      tmdb.first_air_date,
            rating:       tmdb.vote_average ? tmdb.vote_average.toFixed(1) : 'N/A',
            genre:        (tmdb.genres || []).map(g => g.name).join(', '),
            language:     tmdb.original_language,
            country:      (tmdb.origin_country || []).join(', '),
            seasons,
            tmdbID:       tmdb.id,
            imdbID,
            gif
          };
        }

        await dbAgregarItem(data);
        mostrarNotificacion(data.type === 'tv' ? '✅ Serie guardada' : '✅ Película guardada');
        entradaInput.value  = '';
        entradaSeleccionada = null;
        await cargarPeliculas();
      } catch (err) {
        mostrarNotificacion('❌ ' + err.message, false);
      }
    });


    // ── ÚLTIMO EPISODIO VISTO ────────────────────────────
    function getUltimoEp(serieId) {
      try { return JSON.parse(localStorage.getItem('ult_ep_' + serieId) || 'null'); } catch { return null; }
    }
    function setUltimoEp(serieId, season, episode, epName) {
      localStorage.setItem('ult_ep_' + serieId, JSON.stringify({ season, episode, epName: epName || '' }));
    }

    // ── BUSCADOR DE EPISODIOS ────────────────────────────
    // Construye un índice plano de todos los episodios de la serie (usando caché ya cargada)
    async function buscarEnEpisodios(query, serie) {
      const q = query.toLowerCase();
      const results = [];
      const seasons = (serie.seasons || []).filter(s => s.season_number > 0);
      for (const s of seasons) {
        if (!episodiosCache[s.season_number]) {
          episodiosCache[s.season_number] = await buscarTMDBTemporada(serie.tmdbID, s.season_number);
        }
        for (const ep of episodiosCache[s.season_number]) {
          if (ep.name.toLowerCase().includes(q) || String(ep.episode_number).includes(q)) {
            results.push({ season: s.season_number, episode: ep.episode_number, name: ep.name });
          }
        }
      }
      return results.slice(0, 20);
    }

    // ── TOGGLE TIPO ENTRADA ─────────────────────────────
    function setTipoEntrada(tipo) {
      tipoEntrada = tipo;
      const esPelicula = tipo === 'movie';
      document.getElementById('toggle-pelicula').classList.toggle('active', esPelicula);
      document.getElementById('toggle-serie').classList.toggle('active', !esPelicula);
      document.getElementById('form-titulo').textContent = esPelicula ? '＋ AGREGAR PELÍCULA' : '＋ AGREGAR SERIE';
      document.getElementById('entradaPelicula').placeholder = esPelicula ? 'Nombre de la película...' : 'Nombre de la serie...';
      entradaInput.value = '';
      entradaSugg.innerHTML = '';
      entradaSugg.style.display = 'none';
      entradaSeleccionada = null;
    }

    // ── TMDB: BUSCAR SERIE ───────────────────────────────
    async function buscarTMDBSeries(q) {
      const res  = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(q)}&language=en-US`);
      const data = await res.json();
      return data.results || [];
    }

    async function buscarTMDBSerieByID(id) {
      const res  = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${TMDB_API_KEY}&language=en-US&append_to_response=external_ids`);
      const data = await res.json();
      return data;
    }

    async function buscarTMDBTemporada(serieID, seasonNum) {
      const res  = await fetch(`https://api.themoviedb.org/3/tv/${serieID}/season/${seasonNum}?api_key=${TMDB_API_KEY}&language=en-US`);
      const data = await res.json();
      return data.episodes || [];
    }

    // ── SELECTOR TEMPORADA/EPISODIO ──────────────────────

    async function cargarTemporadas(serie, imdbID) {
      const seasons = serie.seasons || [];
      const selT    = document.getElementById('sel-temporada');
      const selE    = document.getElementById('sel-episodio');
      const info    = document.getElementById('ep-info');
      const epSearchInput = document.getElementById('ep-search');
      const epResults     = document.getElementById('ep-results');
      if (!selT || !selE) return;

      selT.innerHTML = seasons
        .filter(s => s.season_number > 0)
        .map(s => `<option value="${s.season_number}">Temporada ${s.season_number} (${s.episode_count} ep.)</option>`)
        .join('');

      // Restaurar último episodio visto si existe
      const ult = getUltimoEp(serie.id);
      if (ult) {
        const optT = selT.querySelector(`option[value="${ult.season}"]`);
        if (optT) selT.value = ult.season;
      }

      async function actualizarEpisodios(jumpToEp) {
        const sNum = parseInt(selT.value);
        selE.innerHTML = '<option>Cargando...</option>';
        if (!episodiosCache[sNum]) {
          episodiosCache[sNum] = await buscarTMDBTemporada(serie.tmdbID, sNum);
        }
        const eps = episodiosCache[sNum];
        selE.innerHTML = eps.map(e =>
          `<option value="${e.episode_number}">Ep. ${e.episode_number}: ${e.name}</option>`
        ).join('');
        if (jumpToEp) selE.value = jumpToEp;
        else if (ult && parseInt(selT.value) === ult.season) selE.value = ult.episode;
        actualizarInfo();
      }

      function actualizarInfo() {
        const s = parseInt(selT.value);
        const e = parseInt(selE.value);
        const epNombre = selE.options[selE.selectedIndex]?.text || '';
        if (info) info.textContent = `Temporada ${s}, Episodio ${e}`;
        // Refrescar iframe si hay uno activo
        const iframe    = document.getElementById('iframe-player');
        const activeBtn = document.querySelector('.iframe-btn.active');
        if (iframe && activeBtn) {
          const servidor = activeBtn.dataset.servidor;
          const useId = ['vidsrc'].includes(servidor) ? imdbID : (serie.tmdbID ? String(serie.tmdbID) : imdbID);
          cargarServidor(servidor, useId, activeBtn, s, e);
        }
        // Actualizar botón "marcar episodio"
        const btnMark = document.getElementById('btn-marcar-ep');
        if (btnMark) btnMark.dataset.season = s, btnMark.dataset.episode = e, btnMark.dataset.name = epNombre;
        // Actualizar barra último visto
        renderUltimoVisto(serie);
      }

      selT.onchange = () => actualizarEpisodios();
      selE.onchange = actualizarInfo;

      // ── Buscador de episodios ──
      if (epSearchInput) {
        let searchTimeout;
        epSearchInput.addEventListener('input', () => {
          clearTimeout(searchTimeout);
          const q = epSearchInput.value.trim();
          if (!q) { epResults.style.display = 'none'; return; }
          searchTimeout = setTimeout(async () => {
            const hits = await buscarEnEpisodios(q, serie);
            if (!hits.length) { epResults.style.display = 'none'; return; }
            epResults.innerHTML = hits.map(h =>
              `<div class="ep-result-item" data-s="${h.season}" data-e="${h.episode}">
                <span class="ep-num">T${h.season}E${h.episode}</span>${h.name}
              </div>`
            ).join('');
            epResults.style.display = 'block';
          }, 250);
        });
        epResults.addEventListener('click', async e => {
          const item = e.target.closest('.ep-result-item');
          if (!item) return;
          const s = parseInt(item.dataset.s);
          const ep = parseInt(item.dataset.e);
          selT.value = s;
          await actualizarEpisodios(ep);
          epSearchInput.value = '';
          epResults.style.display = 'none';
        });
        document.addEventListener('click', e => {
          if (!epSearchInput.contains(e.target) && !epResults.contains(e.target))
            epResults.style.display = 'none';
        });
      }

      await actualizarEpisodios();
    }

    function renderUltimoVisto(serie) {
      const ult = getUltimoEp(serie.id);
      const bar = document.getElementById('ultimo-visto-bar');
      if (!bar) return;
      if (ult) {
        bar.innerHTML = `
          <span class="uv-label">▶ Último visto:</span>
          <span class="uv-val">T${ult.season} E${ult.episode}${ult.epName ? ' — ' + ult.epName : ''}</span>
          <button class="uv-btn" onclick="irAUltimoVisto('${serie.id}')">Ir</button>
          <button class="uv-btn" onclick="limpiarUltimoVisto('${serie.id}')">✕</button>`;
        bar.style.display = 'flex';
      } else {
        bar.style.display = 'none';
      }
    }

    async function irAUltimoVisto(serieId) {
      const ult = getUltimoEp(serieId);
      if (!ult) return;
      const selT = document.getElementById('sel-temporada');
      const selE = document.getElementById('sel-episodio');
      if (selT) selT.value = ult.season;
      // Re-cargar episodios de esa temporada y saltar al episodio
      const serie = peliculasData.find(p => p.id === serieId);
      if (serie) await cargarTemporadas(serie, serie.imdbID || '');
    }

    function limpiarUltimoVisto(serieId) {
      localStorage.removeItem('ult_ep_' + serieId);
      const bar = document.getElementById('ultimo-visto-bar');
      if (bar) bar.style.display = 'none';
    }

  </script>
  </div><!-- /app-container -->

  <script>
    // ── INIT ─────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
    (async () => {
      const token = getToken();
      if (!token) { mostrarUIDeslogueado(); return; }
      // Verify token still valid
      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('invalid');
        const user = await res.json();
        usuarioActual = {
          id:           user.id,
          email:        user.email,
          nombre:       user.user_metadata?.full_name || user.email,
          avatar:       user.user_metadata?.avatar_url || '',
          access_token: token
        };
        mostrarUILogueado();
        await cargarPeliculas();
      } catch {
        clearToken();
        mostrarUIDeslogueado();
      }
    })();
    }); // DOMContentLoaded
  </script>
</body>
